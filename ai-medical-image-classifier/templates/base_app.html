<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CuraVision AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2563eb',
                        bgSoft: '#f8fafc',
                        ok: '#22c55e',
                        danger: '#ef4444'
                    },
                    boxShadow: {
                        card: '0 10px 30px -12px rgba(15, 23, 42, 0.15)'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-bgSoft text-slate-900">
    <div class="flex min-h-screen">
        {% include 'components/sidebar.html' %}
        <div class="flex-1">
            <header class="border-b border-slate-200 bg-white px-6 py-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-semibold">{% block page_title %}CuraVision AI{% endblock %}</h2>
                    <span class="text-sm text-slate-500">AI-powered CDSS</span>
                </div>
            </header>

            <main class="space-y-6 p-6">
                {% include 'components/flash_messages.html' %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
